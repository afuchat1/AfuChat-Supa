name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck api/ (Vercel Edge functions)
        run: npx tsc --project api/tsconfig.json --noEmit

      - name: Typecheck workspace libs
        run: pnpm run typecheck:libs

      - name: Typecheck API server
        run: pnpm --filter @workspace/api-server run typecheck

      - name: Typecheck mobile app
        run: pnpm --filter @workspace/mobile run typecheck
